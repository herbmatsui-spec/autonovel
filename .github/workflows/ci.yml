name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Non-blocking debt trackers (phased strictification) ---
  # These surface the FULL repo's ruff/mypy state via --statistics so we can
  # watch debt shrink. They stay non-blocking until the burn-down reaches the
  # threshold defined in docs/, then they get promoted to blocking.
  #
  # NOTE: the mypy ENTRANCE errors (types.py shadowing stdlib, the stale
  # src/streamlit_app/ duplicate, and the actions.py dual-module name) are
  # all resolved. mypy now parses the whole tree (285 files). The 1769
  # remaining errors are pre-existing strict-mode debt, not blockers.
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt ruff mypy
      - name: Lint (ruff)
        run: ruff check src/ streamlit_app/ tests/
      - name: Lint statistics (debt tracker)
        run: ruff check src/ streamlit_app/ tests/ --statistics || true

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt mypy
      - name: Type check (mypy)
        run: mypy --config-file pyproject.toml src/ streamlit_app/
      - name: Type statistics (debt tracker)
        run: mypy --config-file pyproject.toml src/ streamlit_app/ --statistics || true

  # --- Blocking gates on CHANGED files only (no blanket pass for new code) ---
  # These make `continue-on-error` irrelevant for new contributions: any ruff/
  # format violation in a touched file fails the PR regardless of pre-existing debt.
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.changed.outputs.files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute changed Python files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          git fetch --depth=1 origin "$BASE" 2>/dev/null || true
          # ACMR = Added/Copied/Modified/Renamed (exclude Deleted so ruff
          # is never pointed at a file that no longer exists, e.g. a rename).
          FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" HEAD -- '*.py' | grep -v '^$' | tr '\n' ' ')
          echo "files=${FILES}" >> "$GITHUB_OUTPUT"

  format-check:
    runs-on: ubuntu-latest
    needs: [changed-files]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install ruff
      - name: Ruff format check (changed files)
        run: |
          FILES="${{ needs.changed-files.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No changed Python files; skipping format check."
            exit 0
          fi
          ruff format --check $FILES

  lint-new:
    runs-on: ubuntu-latest
    needs: [changed-files]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install ruff
      - name: Lint (ruff, changed files only)
        run: |
          FILES="${{ needs.changed-files.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No changed Python files; skipping lint."
            exit 0
          fi
          ruff check $FILES

  # --- Test execution (gated by the blocking format/lint gates) ---
  unit-test:
    runs-on: ubuntu-latest
    needs: [format-check, lint-new]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt pytest pytest-asyncio pytest-xdist pytest-cov
      - name: Run unit tests with coverage
        run: pytest -n auto tests/unit --cov=src --cov=streamlit_app --cov-report=xml --cov-report=term -q --junitxml=unit.xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  integration-test:
    runs-on: ubuntu-latest
    needs: [format-check, lint-new]
    services:
      chroma:
        image: chromadb/chroma:0.5.5
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/api/v1/heartbeat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      CHROMA_URL: http://localhost:8000
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt pytest pytest-asyncio pytest-xdist langgraph
      - name: Run integration tests
        run: pytest -n auto tests/integration tests/test_vector_store_lifecycle.py -q --junitxml=integration.xml
