style_definitions:
  style_web_standard:
    name: "なろう・カクヨム標準（テンポ重視）"
    instruction: "【指針】短文と改行を多用し、スマホでの読みやすさを最優先せよ。主人公への称賛とチート能力の結果を淡々と、かつ爽快に描け。1段落は最大2文まで。"
    dialogue_ratio: "60%"
    syntax_rhythm: "1文20文字以内、体言止め多用。感嘆符の後は必ず全角スペース。"
    metaphor_dna: "光、速度、ゲーム的UI効果音。「紙切れのように」等、敵の脆さを強調する比喩。"
    noise_dna: "「ま、いっか」という思考放棄。頬を掻く、ため息。周囲の驚嘆に対する無自覚なスルー。"
    golden_rules: |
      [CORE_MANIFESTO: ENT_MUZOU]
      - [STRICT_SHOW]: No meta-emotions. Translate to physical kinesics.
      - [NO_SIMILE]: Ban 'like/as'. Use direct metaphors only.
      - [ACTION_CHASE]: Keep (Dialogue -> Action -> Dialogue) ping-pong rhythm.
      - [NO_EXPLAIN]: Zero mechanics talk. Focus on sensory 'results'.
      - [STRESS_GEN]: Villain acts with 'hypocritical kindness'.
      - [STRONG_CALM]: MC is abnormally indifferent to pain/crisis.
      - [STACCATO]: Avg sentence <40 chars. Frequent nouns endings.
      - [GAP_EFFECT]: Contrast gore with mundane daily details.
      - [CLIFFHANGER]: Ending MUST trigger 'Crisis/Truth/Cost' (No peace).
    negative_prompt: "現代知識, 地球の技術, マヨネーズ, 上下水道, 記憶喪失, 思い出の消失, 名前を忘れる, 『冷や汗』『瞳孔が開く』『絶望』『顔が歪む』『嘔吐』などの大仰で劇的なシリアスワード"
    is_light: true
  style_serious_fantasy:
    name: "ハイファンタジー（無職転生風）"
    instruction: "【指針】回想的かつ内省的なトーンで記述せよ。五感を通じた生活感を重視し、弱さを隠さない客観的な心理描写を行え。"
    dialogue_ratio: "20%"
    syntax_rhythm: "1文40文字前後、重厚な接続詞。心情の直接描写禁止（風景に仮託）。"
    metaphor_dna: "泥、鉄の錆、血の匂い、冷たい雨。感情を「温度」や「重力」で表現。"
    noise_dna: "前世のトラウマによるフラッシュバック。古傷の疼き、泥を握りしめる感触。"
    golden_rules: |
      [CORE_MANIFESTO: DARK_HARD]
      - [SUBJECTIVE_ONLY]: No author meta-commentary. Focus on MC's limited view.
      - [BODILY_LANG]: Translate anger/fear to visceral pain/coldness.
      - [SURGICAL_VIOLENCE]: Describe combat as chronological anatomical events.
      - [FETISH_DETAIL]: Show emotion via interaction with environment/tools.
      - [IRREVERSIBLE]: Loss must be permanent (severed/broken).
      - [SILENCE_BUFFER]: Use 'dead silence' before explosive actions.
      - [SMOOTH_TRANS]: No time-skips. Use light/sound for transitions.
      - [CLIFFHANGER]: End with a betrayal of peace/sudden despair.
    negative_prompt: "現代知識, 地球の技術, マヨネーズ, 上下水道, 目を見開く, 瞳孔が収縮する, 胃の腑が冷える, 記憶喪失, 思い出の消失, 名前を忘れる, 『笑い』『コミカル』等の軽薄なワードやギャグ表現"
    is_light: false
  style_psychological_loop:
    name: "死に戻り・絶望（リゼロ風）"
    instruction: "【指針】呼吸音や絶叫を交え、切迫した心理を畳み掛けろ。自己嫌悪と他者への執着を、粘着質に繰り返せ。"
    dialogue_ratio: "40%"
    syntax_rhythm: "短い単語の3連続反復（熱い熱い熱い）。倒置法による切迫感の演出。"
    metaphor_dna: "臓腑の冷たさ、吐瀉物の酸味。世界が「歪む」「ひび割れる」表現。"
    noise_dna: "過呼吸、歯の根が合わない震え。幻聴、眼球の痙攣。"
    golden_rules: |
      [CORE_MANIFESTO: CHAR_PSYCHO]
      - [SHOW_EGO]: Show personality via erratic behavior, not adjectives.
      - [COG_GAP]: Drive plot via 'rational MC vs delusional observers'.
      - [HEAVY_LOVE]: Favor 'obsession/dependency' over simple kindness.
      - [REACTION_PORN]: Lavishly describe NPCs' shock/horror at MC.
      - [SENSORY_FETISH]: Mandatory scent/temp/touch in every interaction.
      - [HUMILIATION]: Villain must attack MC's dignity publicly.
      - [CLIFFHANGER]: End with 'betrayal of trust' or 'fatal secret'.
    negative_prompt: "現代知識, 地球の技術, マヨネーズ, 上下水道, 記憶喪失, 思い出の消失, 名前を忘れる"
  style_chat_log:
    name: "ダンジョン配信（掲示板・コメント風）"
    instruction: "【指針】地の文に加え、配信コメントや掲示板のレスを挿入せよ。ネットスラングを多用し、ライブ感を演出せよ。"
    dialogue_ratio: "70%"
    syntax_rhythm: "「草」「ｗ」などのネットスラング。レス番、タイムスタンプの羅列。"
    metaphor_dna: "画面の明滅、タイピングの打鍵音。「バグ」「チート」等のメタ語彙。"
    noise_dna: "誤字と訂正、文脈を無視した煽り合い。「これってマ？」等の現実逃避。"
    golden_rules: |
      [CORE_MANIFESTO: ENT_MUZOU]
      - [STRICT_SHOW]: No meta-emotions. Translate to physical kinesics.
      - [NO_SIMILE]: Ban 'like/as'. Use direct metaphors only.
      - [ACTION_CHASE]: Keep (Dialogue -> Action -> Dialogue) ping-pong rhythm.
      - [NO_EXPLAIN]: Zero mechanics talk. Focus on sensory 'results'.
      - [STRESS_GEN]: Villain acts with 'hypocritical kindness'.
      - [STRONG_CALM]: MC is abnormally indifferent to pain/crisis.
      - [STACCATO]: Avg sentence <40 chars. Frequent nouns endings.
      - [GAP_EFFECT]: Contrast gore with mundane daily details.
      - [CLIFFHANGER]: Ending MUST trigger 'Crisis/Truth/Cost' (No peace).
    negative_prompt: "現代知識, 地球の技術, マヨネーズ, 上下水道, 記憶喪失, 思い出の消失, 名前を忘れる, 『冷や汗』『瞳孔が開く』『絶望』『顔が歪む』『嘔吐』などの大仰で劇的なシリアスワード"
  style_villainess_elegant:
    name: "悪役令嬢（優雅・皮肉）"
    instruction: "【指針】優雅な敬語（お嬢様言葉）で毒を吐け。ドレスや宝石の美しさを描写しつつ、高度な皮肉の応酬を行え。"
    dialogue_ratio: "50%"
    syntax_rhythm: "「〜ですわ」「〜こと」等、優雅な長文。段落頭に優雅な動作のト書きを強制。"
    metaphor_dna: "紅茶の香り、絹 of 衣擦れ。相手を「路傍の石」と表現。"
    noise_dna: "扇で口元を隠す、ドレスの皺を伸ばす。内心の「イラッ」を笑顔で隠す筋肉の引き攣り。"
    golden_rules: |
      [CORE_MANIFESTO: CHAR_PSYCHO]
      - [SHOW_EGO]: Show personality via erratic behavior, not adjectives.
      - [COG_GAP]: Drive plot via 'rational MC vs delusional observers'.
      - [HEAVY_LOVE]: Favor 'obsession/dependency' over simple kindness.
      - [REACTION_PORN]: Lavishly describe NPCs' shock/horror at MC.
      - [SENSORY_FETISH]: Mandatory scent/temp/touch in every interaction.
      - [HUMILIATION]: Villain must attack MC's dignity publicly.
      - [CLIFFHANGER]: End with 'betrayal of trust' or 'fatal secret'.
    negative_prompt: "現代知識, 地球の技術, マヨネーズ, 上下水道, 記憶喪失, 思い出の消失, 名前を忘れる"
  style_military_rational:
    name: "戦記・合理的（幼女戦記風）"
    instruction: "【指針】感情を排した報告書的な文体を維持せよ。硬質な語彙を用い、徹底的な合理主義を貫け。"
    dialogue_ratio: "15%"
    syntax_rhythm: "「故に」「したがって」等、論理的接続詞。主観的形容詞（悲しい等）の完全排除。"
    metaphor_dna: "硝煙、機械の駆動音、冷たい金属。損耗率、確率の数値化。"
    noise_dna: "眼鏡を押し上げる、軍服の襟を正す。無能な味方に対する冷たい舌打ち。"
    golden_rules: |
      [CORE_MANIFESTO: DARK_HARD]
      - [SUBJECTIVE_ONLY]: No author meta-commentary. Focus on MC's limited view.
      - [BODILY_LANG]: Translate anger/fear to visceral pain/coldness.
      - [SURGICAL_VIOLENCE]: Describe combat as chronological anatomical events.
      - [FETISH_DETAIL]: Show emotion via interaction with environment/tools.
      - [IRREVERSIBLE]: Loss must be permanent (severed/broken).
      - [SILENCE_BUFFER]: Use 'dead silence' before explosive actions.
      - [SMOOTH_TRANS]: No time-skips. Use light/sound for transitions.
      - [CLIFFHANGER]: End with a betrayal of peace/sudden despair.
