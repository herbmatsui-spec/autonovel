name: "Web小説 追放ざまぁ特化"
genre: "web_novel"

emotion_curve:
  - phase: "Hate"
    instruction: "読者の『ざまぁ』欲求を最大化せよ。敵の傲慢さと不当な辱めを執拗に描写せよ。"
  - phase: "Payoff"
    instruction: "周囲の『絶望・後悔・畏怖』の反応描写に文字数の7割を割け。"
  - phase: "Prep"
    instruction: "逆転への足がかりとなる力や伏線を静かに仕込め。主人公の静かな決意を描写せよ。"

plot_common_rules: |
  【真・プロット設計黄金律 10カ条（絶対遵守）】
  1. [1話1シーンと高解像度化]: 時間スキップ・ダイジェストを禁ずる。
  2. [Show, Don't Tell]: 感情は肉体動作に翻訳し、各シーンに3つ以上の具体的な五感情報を組み込め。
  3. [能動性と意志の火]: 窮地での「小さな抵抗（意志）」を必ず描け。
  4. [悪役の知略]: 敵対者を知略的な存在とし、カタルシス前話では尊厳を奪い、ストレスを極限まで溜めよ。
  5. [認識のズレ]: 主人公の意図と周囲の解釈の乖離を物語の推進力とせよ。
  10. [伏線の先行配置]: 逆転の数行前までに伏線を配置し、ご都合主義を防げ。

style_presets:
  - name: "丸山くがね（オーバーロード系）"
    genre: "ダークファンタジー"
    works: "オーバーロード"
    description: "圧倒的な強者視点と知略的描写。敵対者への詳細な心理分析"
    dna: |
      【丸山くがね型・知略ダークファンタジー文体】
      1. 一人称だが極めて分析的：主人公は常に状況を論理的に評価し、読者に計算過程を見せる。
      2. 強者の余裕：感情的動揺を内部で抑制しながら、表面上は冷静を装う二重構造を徹底する。
      3. 敵の知力を尊重：敵対者を愚かに描かず、その判断の合理性を認めつつ「それでも届かない」差を描く。
      4. 世界の重厚感：魔法や技術の仕組みを詳述し、読者に「体系が存在する」感覚を与える。
      5. 独白の哲学性：戦闘や選択の前に、主人公が道徳的・哲学的に自己を問い直す独白を挟む。
      6. 長文密度型：1文が長く情報密度が高い。読点を多用し、思考の流れを途切れさせない。
    tag: "AUTHOR:丸山くがね"

  - name: "長月達平（Re:ゼロ系）"
    genre: "心理サスペンス転生"
    works: "Re:ゼロから始める異世界生活"
    description: "絶望と精神崩壊の描写。感情的起伏が激しく読者を振り回す"
    dna: |
      【長月達平型・心理サスペンス転生文体】
      1. 希望と絶望の高低差：読者に期待を持たせてから、その足元を根こそぎ崩す展開を繰り返す。
      2.精神崩壊の段階描写：極限状態での人間の思考がバラバラになる過程を、断片的な文章で表現する。
      3. 外部視点との乖離：主人公の認識と周囲の状況の差を丁寧に描き、孤独感を際立たせる。
      4. 感情名詞を使わない：「恐怖」と書かず、「奥歯が砕けるほど噛み締めた」など肉体反応で表現する。
      5. 繰り返しによる強調：重要なセリフや場面の要素を、わずかに形を変えて複数回登場させる。
      6. テンポの急変：静かな日常描写から突然の暴力的展開へ、接続詞なしで切り替える。
    tag: "AUTHOR:長月達平"

  - name: "和ヶ原聡司（幼女戦記系）"
    genre: "軍事合理主義"
    works: "幼女戦記"
    description: "官僚的合理主義と戦略的思考。軍事・行政用語の多用"
    dna: |
      【和ヶ原聡司型・軍事合理主義文体】
      1. 官僚的一人称：感情より論理を優先し、会議・命令・報告書の語法を小説に持ち込む。
      2. 専門用語の積極使用：軍事・行政・経済の実在する専門用語を正確に使い、リアリティを高める。
      3. コスト意識の徹底：行動を選択する際、常に損益計算を開示する（例：「この人命コストに見合うか」）。
      4. 皮肉なナレーション：読者だけに届くメタなコメントで、状況の矛盾や滑稽さを指摘する。
      5. 局面的・戦略的プロット開示：主人公が数手先の計画を立て、それが段階的に実現していく知的カタルシス。
      6. 短文と長文の対比：命令・結論は短文。分析・推論は長文。リズムで重要度を区別する。
    tag: "AUTHOR:和ヶ原聡司"

  - name: "アネコユサギ（盾の勇者系）"
    genre: "追放・成り上がり"
    works: "盾の勇者の成り上がり"
    description: "裏切られた主人公の不信感と孤独な成長。ダークな世界観"
    dna: |
      【アネコユサギ型・追放成り上がり文体】
      1. 不信の一人称：主人公は周囲を常に疑い、他者の親切に対しても警戒を解かない視点を維持する。
      2. 実力の積み上げ描写：一歩一歩の地道な成長を、数値や具体的な変化で丁寧に示す。
      3. 敵意ある世界観：主人公を取り巻く世界が基本的に敵対的で、小さな善意が際立つ。
      4. 復讐心の制御：ざまあへの逆親しみ欲求を内に抱えながら、それを冷静に制御する主人公の自制を描く。
      5. 弱者への共感：自分が弱者だった経験から、虐げられる者への自然な共感を示す。
      6. 台詞の簡潔さ：感情的な長台詞を避け、短くて重みのある言葉で心情を表現する。
    tag: "AUTHOR:アネコユサギ"

