character_expansion_themes:
  主人公:
    - "過去の挫折・不当な扱いのフラッシュバック"
    - "独自の技術・武器・魔術へのフェティッシュな執着"
    - "内なる矛盾や独白"
  ヒロイン:
    - "主人公への無自覚な独占欲や微細な嫉妬"
    - "隠された出自や家柄に伴う重圧"
    - "特定の香りや装飾品への愛着"
  ライバル:
    - "主人公への敗北感と屈辱の再燃"
    - "武器や技の手入れに見る異常なまでのストイックさ"
    - "高慢さの裏にある焦燥"
  悪役:
    - "歪んだ正義感や美学の独白"
    - "他者の恐怖や苦痛を味わう生理的な反応"
    - "過去に受けた傷跡の疼き"
  default:
    - "特定の癖（指を鳴らす、唇を噛む等）"
    - "周囲の環境変化への過敏な反応"
    - "道具や衣装の質感へのこだわり"

anti_patterns:
  common:
    - "主人公が都合よく助けられる（デウス・エクス・マキナ）"
    - "敵が急に弱くなる、または理由なく改心する"
    - "ヒロインが主人公のチート能力に驚くだけで物語に能動的に関わらない"
    - "説明台詞が長く、状況を読者に語りかける（Show, Don't Tell違反）"
    - "危機が簡単に解決され、緊張感が持続しない"
    - "主人公が過去のトラウマを簡単に乗り越える"
    - "物語の序盤で全ての謎が解明される"
    - "読者の予想通りの展開が続く"

