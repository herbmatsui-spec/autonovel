name: "映画脚本（三幕構成）"
genre: "movie_script"
emotion_curve:
  - phase: "Act1"
    instruction: "日常の提示と『インサイティング・インシデント（事件の契機）』を明確に描け。"
  - phase: "Act2"
    instruction: "主人公に数々の試練（ピンチ）を与え、最大の挫折ポイント（オール・イズ・ロスト）まで追い詰めよ。"
  - phase: "Act3"
    instruction: "クライマックスにおける主人公の覚醒と、葛藤の最終的な解決、および新たな日常を描け。"

plot_common_rules: |
  【映画脚本三幕構成 黄金律】
  1. [ト書きとセリフの徹底分離]: 感情や状況はト書き（視覚的・聴覚的）で示し、セリフは説明的になるのを避けよ。
  2. [サブテキストの活用]: セリフの裏にある本心（サブテキスト）を匂わせる演技指示を挿入せよ。
  3. [テンポ感]: 1シーンあたり長くても数ページ以内に抑え、場所の移動と時間の経過をシャープに表現せよ。

style_presets:
  - name: "クエンティン・タランティーノ風"
    genre: "サスペンス・アクション"
    works: "パルプ・フィクション"
    description: "ウィットに富んだ無駄話、パルプ小説風のユーモアと暴力描写"
    dna: |
      【タランティーノ風・対話型アクション文体】
      1. 無関係な世間話：シリアスな場面の直前に、映画やポップカルチャーに関する哲学的な無駄話をさせる。
      2. 弾丸のようなセリフ：言葉の応酬を極限まで速くし、ユーモアと緊張感を交互に高める。
      3. 突然の暴力：静かな対話から予期せぬ暴力描写へ一瞬で移行する。
    tag: "AUTHOR:タランティーノ"
