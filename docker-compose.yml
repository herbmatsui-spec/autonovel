services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kaku_backend
    command: uvicorn src.backend.server:app --host 0.0.0.0 --port 8200
    ports:
      - "8200:8200"
    environment:
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: kaku_frontend_dev
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: kaku_frontend_prod
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
